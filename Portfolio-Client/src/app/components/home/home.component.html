<div class="portfolio-wrapper">

  <div class="score-tracker">
    <span>🪙 Coins: {{ gameScore() }}</span>
  </div>
  <div class="global-coin"
       [style.top]="coinPosition().top"
       [style.left]="coinPosition().left"
       (click)="catchCoin()">
  </div>

  <section class="hero">
    <div class="hero-content">
      <h1>Hi, I'm {{ profile().name }}</h1>
      <h2 class="accent-text">{{ profile().role }}</h2>
      <p>{{ profile().bio }}</p>

      <div class="action-buttons">
        <a *ngIf="profile().cvUrl" [href]="profile().cvUrl" target="_blank" class="btn-primary">Download CV</a>
        <a *ngIf="profile().email" [href]="'mailto:' + profile().email" class="btn-secondary">Get in Touch</a>
      </div>
    </div>

    <div class="hero-visual">
      <img *ngIf="profile().photoUrl" [src]="profile().photoUrl" alt="Profile Photo" class="profile-img">
    </div>
  </section>

  <section class="projects">
    <h2>Selected Works</h2>
    <div class="grid">
      @for (p of projects(); track p.id) {
      <div class="card" (click)="openProject(p)">
        <div class="card-image">
          <img [src]="p.previewImageUrl || 'https://placehold.co/600x400/eee/999?text=No+Image'" alt="Preview">
          <div class="overlay">
            <span>View Details</span>
          </div>
        </div>
        <div class="card-info">
          <h3>{{ p.name }}</h3>
            <span class="genre">{{ p.genre }}</span>
          </div>
        </div>
      }
    </div>
  </section>

</div>
